<script>
(function(){
'use strict';

// THEME
var dark=localStorage.getItem('bp_theme')!=='light';
var DARK={bg:'#0a0a0a',surface:'#141414',border:'#252525',text:'#f5f5f5',muted:'#5a5a5a',barBg:'#1e1e1e'};
var LIGHT={bg:'#f8f9fa',surface:'#ffffff',border:'#e5e7eb',text:'#111827',muted:'#9ca3af',barBg:'#f3f4f6'};
function D(){return dark?DARK:LIGHT;}
function applyPinTheme(){
  var d=D();
  var ps=document.getElementById('pin-screen');
  ps.style.background=d.bg; ps.style.color=d.text;
  document.getElementById('pin-sub').style.color=d.muted;
  document.querySelectorAll('.pin-key:not(.empty)').forEach(function(b){
    b.style.background=d.surface; b.style.color=d.text; b.style.border='1.5px solid '+d.border;
  });
}

// PIN
var PIN=String(APP_PIN||'0916'),pinEntry='';
var dotsEl=document.getElementById('pin-dots');
for(var i=0;i<PIN.length;i++){var dot=document.createElement('div');dot.className='pin-dot';dot.id='pd'+i;dotsEl.appendChild(dot);}
applyPinTheme();
function updDots(){for(var i=0;i<PIN.length;i++){var d=document.getElementById('pd'+i);if(d)d.className='pin-dot'+(i<pinEntry.length?' filled':'');}}
function shakeErr(){document.querySelectorAll('.pin-dot').forEach(function(d){d.className='pin-dot error';});document.getElementById('pin-error').textContent='Incorrect PIN';setTimeout(function(){pinEntry='';updDots();document.getElementById('pin-error').textContent='';},900);}
if(sessionStorage.getItem('bp_ok')==='1')unlock();
document.querySelectorAll('.pin-key').forEach(function(btn){
  btn.addEventListener('click',function(){
    var k=btn.dataset.k;if(!k)return;
    if(k==='del'){pinEntry=pinEntry.slice(0,-1);updDots();return;}
    if(pinEntry.length>=PIN.length)return;
    pinEntry+=k;updDots();
    if(pinEntry.length===PIN.length){if(pinEntry===PIN){sessionStorage.setItem('bp_ok','1');setTimeout(unlock,150);}else setTimeout(shakeErr,100);}
  });
});
function unlock(){document.getElementById('pin-screen').classList.add('hidden');document.getElementById('app').style.display='block';initApp();}

// HELPERS
var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MOF=['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtD(d){return MO[d.getMonth()]+' '+d.getDate();}
function fmt$(n){return '$'+Math.abs(Math.round(n||0)).toLocaleString();}
function fmtDec(n){return '$'+Math.abs(parseFloat(n)||0).toFixed(2);}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function dk(d){return d.toISOString().slice(0,10);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
var TODAY=new Date();TODAY.setHours(0,0,0,0);
var todayStr=dk(TODAY);
function nextWed(f){var d=new Date(f);d.setHours(0,0,0,0);while(d.getDay()!==3)d.setDate(d.getDate()+1);return d;}
function wifePaysMonth(y,m){return[7,21].map(function(day){var d=new Date(y,m,day);if(d.getDay()===6)d.setDate(d.getDate()-1);if(d.getDay()===0)d.setDate(d.getDate()-2);return d;});}
function buildWeeks(){
  var ye=new Date(TODAY.getFullYear(),11,31);
  var s=new Date(TODAY);var dow=s.getDay();s.setDate(s.getDate()-(dow===0?6:dow-1));
  var wks=[],c=new Date(s);
  while(c<=ye){wks.push({weekStart:new Date(c),weekEnd:addDays(c,6),id:dk(c)});c=addDays(c,7);}
  return wks;
}
function buildPayDates(yr){
  var md=[],wd=[],ys=new Date(yr,0,1),ye=new Date(yr,11,31);
  var w=nextWed(ys);while(w<=ye){md.push(new Date(w));w=addDays(w,7);}
  for(var m=0;m<=11;m++)wifePaysMonth(yr,m).forEach(function(d){if(d>=ys&&d<=ye)wd.push(d);});
  return{myDates:md,wifeDates:wd};
}
function paysInRange(dates,s,e){return dates.filter(function(d){return d>=s&&d<=e;});}

var WEEKS=buildWeeks();
var PAY=buildPayDates(TODAY.getFullYear());
var CUR_WK=WEEKS[0].id;
var activeWeek=CUR_WK;
var currentTab='week';
var openBuckets={};

function initApp(){
  firebase.initializeApp(FIREBASE_CONFIG);
  var ROOT=firebase.database().ref('budgetpro');
  if(localStorage.getItem('hint'))document.getElementById('hint-bar').classList.add('hidden');

  var syncT=null;
  function showSync(type,msg){var bar=document.getElementById('sync-bar'),txt=document.getElementById('sync-msg');if(!bar||!txt)return;txt.textContent=msg;bar.className='sync-bar show '+type;clearTimeout(syncT);if(type==='saved')syncT=setTimeout(function(){bar.className='sync-bar';},2500);}
  function fbSet(path,val){showSync('saving','Saving...');ROOT.child(path).set(val,function(e){if(e)showSync('error','Save failed');else showSync('saved','Synced');});}
  function fbRemove(path){ROOT.child(path).remove();showSync('saved','Synced');}

  var S={myPay:1346,wifePay:850,buckets:['Bills','Groceries','Gas','Personal'],bucketConfig:{},weekBudgets:{},purchases:{},payOverrides:{},rolloverOverrides:{},savedRollovers:{},savingsGoals:[],savingsAllocations:{},skippedBuckets:{},weekNotes:{}};

  ROOT.on('value',function(snap){
    var data=snap.val();
    if(data){
      if(typeof data.myPay==='number')S.myPay=data.myPay;
      if(typeof data.wifePay==='number')S.wifePay=data.wifePay;
      if(Array.isArray(data.buckets)&&data.buckets.length)S.buckets=data.buckets;
      if(data.bucketConfig)S.bucketConfig=data.bucketConfig;
      if(data.weekBudgets)S.weekBudgets=data.weekBudgets;
      if(data.purchases)S.purchases=data.purchases;
      if(data.payOverrides)S.payOverrides=data.payOverrides;
      if(data.rolloverOverrides)S.rolloverOverrides=data.rolloverOverrides;
      if(data.savedRollovers)S.savedRollovers=data.savedRollovers;
      if(Array.isArray(data.savingsGoals))S.savingsGoals=data.savingsGoals;
      if(data.savingsAllocations)S.savingsAllocations=data.savingsAllocations;
      if(data.skippedBuckets)S.skippedBuckets=data.skippedBuckets;
      if(data.weekNotes)S.weekNotes=data.weekNotes;
    }
    renderAll();showSync('saved','Synced');
  },function(){showSync('error','Sync error');});

  // LOGIC
  function getWeekIncome(wk){var ov=S.payOverrides[wk.id]||{};var mp=paysInRange(PAY.myDates,wk.weekStart,wk.weekEnd);var wp=paysInRange(PAY.wifeDates,wk.weekStart,wk.weekEnd);var mt=mp.length?(ov.me!==undefined?ov.me:S.myPay)*mp.length:0;var wt=wp.length?(ov.wife!==undefined?ov.wife:S.wifePay)*wp.length:0;return{total:mt+wt,myPays:mp,wifePays:wp};}
  function getCyclePos(bucket,weekId){var cfg=S.bucketConfig[bucket]||S.bucketConfig[encKey(bucket)];if(!cfg||cfg.cadence!=='biweekly'||!cfg.week1Id)return null;var msW=7*24*60*60*1000;var a=new Date(cfg.week1Id);a.setHours(0,0,0,0);var t=new Date(weekId);t.setHours(0,0,0,0);var diff=Math.round((t-a)/msW);if(diff<0)return null;var cn=Math.floor(diff/2),pos=(diff%2)+1;var w1=new Date(a.getTime()+cn*2*msW),w2=new Date(w1.getTime()+msW);return{pos:pos,week1Id:dk(w1),week2Id:dk(w2)};}
  function getPurchasesFor(weekId,bucket){return Object.values(S.purchases||{}).filter(function(p){return p.weekId===weekId&&p.bucket===bucket;}).sort(function(a,b){return a.date>b.date?1:-1;});}
  function getBucketState(bucket,weekId){
    var cfg=S.bucketConfig[bucket]||S.bucketConfig[encKey(bucket)];if(!cfg)return{configured:false};
    var purchases=getPurchasesFor(weekId,bucket);
    var spent=purchases.reduce(function(s,p){return s+(parseFloat(p.amt)||0);},0);
    if(cfg.cadence==='weekly'){var wbVal=(S.weekBudgets[weekId]||{})[bucket];var bud=(wbVal!==undefined&&wbVal!==null)?parseFloat(wbVal):parseFloat(cfg.amount)||0;return{configured:true,cadence:'weekly',budget:bud,spent:spent,remaining:bud-spent,pct:bud>0?Math.min(100,(spent/bud)*100):0,incomeDeduction:bud>0?bud:spent};}
    var pos=getCyclePos(bucket,weekId);if(!pos)return{configured:true,cadence:'biweekly',offCycle:true,spent:spent,incomeDeduction:0};
    var amt=parseFloat(cfg.amount)||0;
    if(pos.pos===1)return{configured:true,cadence:'biweekly',pos:1,budget:amt,spent:spent,remaining:amt-spent,pct:amt>0?Math.min(100,(spent/amt)*100):0,incomeDeduction:amt,week1Id:pos.week1Id,week2Id:pos.week2Id};
    var w1s=getPurchasesFor(pos.week1Id,bucket).reduce(function(s,p){return s+(parseFloat(p.amt)||0);},0);
    var autoRoll=Math.max(0,amt-w1s);
    var rovKey=weekId+'__'+bucket;
    var sKey=weekId+'__'+encodeURIComponent(bucket).replace(/%/g,'_');
    var stored=S.savedRollovers&&S.savedRollovers[sKey];
    var rollover=S.rolloverOverrides[rovKey]!==undefined?parseFloat(S.rolloverOverrides[rovKey]):stored!==undefined?parseFloat(stored):autoRoll;
    if(stored===undefined)fbSet('savedRollovers/'+sKey,autoRoll);
    var avail=Math.max(0,rollover);
    return{configured:true,cadence:'biweekly',pos:2,budget:amt,available:avail,autoRollover:autoRoll,rollover:rollover,spent:spent,remaining:avail-spent,pct:avail>0?Math.min(100,(spent/avail)*100):0,incomeDeduction:0,week1Id:pos.week1Id,week2Id:pos.week2Id};
  }
  function encKey(s){return encodeURIComponent(s).replace(/%/g,'_');}
  function isSkipped(weekId,bucket){return!!(S.skippedBuckets&&S.skippedBuckets[weekId]&&(S.skippedBuckets[weekId][bucket]||S.skippedBuckets[weekId][encKey(bucket)]));}
  function getWeekDeductions(weekId){return S.buckets.reduce(function(t,b){if(isSkipped(weekId,b))return t;var bs=getBucketState(b,weekId);return t+(bs.configured?(bs.incomeDeduction||0):0);},0);}
  function getCarryForward(weekId){var wi=WEEKS.findIndex(function(w){return w.id===weekId;});if(wi<=0)return 0;var total=0;for(var i=0;i<wi;i++)total+=getWeekIncome(WEEKS[i]).total-getWeekDeductions(WEEKS[i].id);return total;}

  // RENDER
  var shellBuilt=false;
  function renderAll(){
    if(!shellBuilt){shellBuilt=true;buildShell();}
    renderTabs();
    if(currentTab==='week')renderWeek();else renderMonth();
  }

  function css(obj){return Object.keys(obj).map(function(k){return k.replace(/([A-Z])/g,function(m){return'-'+m.toLowerCase();})+':'+obj[k];}).join(';');}

  function buildShell(){
    var d=D();
    document.body.style.background=d.bg;document.body.style.color=d.text;
    document.getElementById('app').style.background=d.bg;document.getElementById('app').style.color=d.text;
    document.getElementById('app').innerHTML=
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:22px 20px 18px">'
      +'<div style="display:flex;align-items:center;gap:12px">'
      +'<div style="width:42px;height:42px;background:#22C55E;border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(34,197,94,.4)">'
      +'<span style="font-family:\'DM Serif Display\',serif;font-size:26px;color:white;line-height:1">$</span></div>'
      +'<div><div style="font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:'+d.muted+'">Paycheck Planner</div>'
      +'<div style="font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.1">BudgetPro</div></div></div>'
      +'<div style="display:flex;gap:8px">'
      +'<button id="btn-export" style="background:'+d.surface+';border:1px solid '+d.border+';border-radius:10px;width:40px;height:40px;cursor:pointer;color:'+d.muted+';font-size:17px;display:flex;align-items:center;justify-content:center">&#8595;</button>'
      +'<button id="btn-theme" style="background:'+d.surface+';border:1px solid '+d.border+';border-radius:10px;width:40px;height:40px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center">'+(dark?'&#9728;&#65039;':'&#127769;')+'</button>'
      +'</div></div>'
      +'<div id="tabs" style="display:flex;margin:0 20px 20px;border-radius:12px;padding:4px;border:1px solid '+d.border+';background:'+d.surface+'"></div>'
      +'<div id="tab-content"></div>';
    document.getElementById('btn-export').addEventListener('click',openExportModal);
    document.getElementById('btn-theme').addEventListener('click',function(){dark=!dark;localStorage.setItem('bp_theme',dark?'dark':'light');shellBuilt=false;renderAll();});
    document.getElementById('fab').addEventListener('click',function(){openPurchaseModal(S.buckets[0]||'',null);});
  }

  function renderTabs(){
    var d=D();var el=document.getElementById('tabs');if(!el)return;el.innerHTML='';
    [['week','This Week'],['month','Month']].forEach(function(pair){
      var btn=document.createElement('button');btn.textContent=pair[1];
      btn.style.cssText='flex:1;padding:10px;border:none;border-radius:9px;font-weight:600;font-size:14px;cursor:pointer;transition:all .15s;background:'+(currentTab===pair[0]?'#22C55E':'transparent')+';color:'+(currentTab===pair[0]?'white':d.muted);
      btn.addEventListener('click',function(){currentTab=pair[0];renderAll();});
      el.appendChild(btn);
    });
  }

  function renderWeek(){
    var d=D();
    var week=WEEKS.find(function(w){return w.id===activeWeek;})||WEEKS[0];
    var inc=getWeekIncome(week);
    var ov=S.payOverrides[week.id]||{};
    var ded=getWeekDeductions(week.id);
    var carry=getCarryForward(week.id);
    var left=inc.total-ded;
    var isCur=week.id===CUR_WK;
    var h='';

    // Pay inputs
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 20px">';
    [{lbl:'Your Check',sub:'Every Wednesday',key:'myPay'},{lbl:"Wife's Check",sub:'7th & 21st',key:'wifePay'}].forEach(function(item){
      h+='<div style="background:'+d.surface+';border-radius:14px;padding:14px 16px;border:1px solid '+d.border+'">'
        +'<div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:'+d.muted+';margin-bottom:2px">'+item.lbl+'</div>'
        +'<div style="font-size:11px;color:'+d.muted+';margin-bottom:8px">'+item.sub+'</div>'
        +'<div style="display:flex;align-items:baseline;gap:3px"><span style="font-size:15px;color:'+d.muted+'">$</span>'
        +'<input type="number" inputmode="decimal" data-paykey="'+item.key+'" value="'+S[item.key]+'" style="background:none;border:none;font-size:24px;font-weight:700;color:'+d.text+';width:100%;padding:0"/>'
        +'</div></div>';
    });
    h+='</div>';

    // Week scroller
    h+='<div style="display:flex;gap:8px;overflow-x:auto;padding:0 20px 16px;-webkit-overflow-scrolling:touch" id="week-scroll">';
    WEEKS.forEach(function(w){
      var i=getWeekIncome(w),d2=getWeekDeductions(w.id),e=i.total-d2;
      var isAct=w.id===activeWeek,isCurWk=w.id===CUR_WK;
      h+='<button data-wkchip="'+w.id+'" style="flex-shrink:0;padding:10px 14px;border-radius:12px;border:1.5px solid '+(isAct?'#22C55E':d.border)+';background:'+(isAct?(dark?'rgba(34,197,94,.08)':'rgba(34,197,94,.06)'):'transparent')+';color:'+d.text+';text-align:left;cursor:pointer;min-width:110px">'

  function wireWeek(week){
    var bT={};
    // Pay inputs
    document.querySelectorAll('[data-paykey]').forEach(function(inp){inp.addEventListener('input',function(e){S[e.target.dataset.paykey]=parseFloat(e.target.value)||0;clearTimeout(bT['pk_'+e.target.dataset.paykey]);bT['pk_'+e.target.dataset.paykey]=setTimeout(function(){fbSet(e.target.dataset.paykey,S[e.target.dataset.paykey]);},700);});});
    // Week chips
    document.querySelectorAll('[data-wkchip]').forEach(function(btn){btn.addEventListener('click',function(){activeWeek=btn.dataset.wkchip;renderAll();});});
    // Pay overrides
    document.querySelectorAll('[data-payov]').forEach(function(inp){inp.addEventListener('input',function(e){clearTimeout(bT['pov']);bT['pov']=setTimeout(function(){fbSet('payOverrides/'+e.target.dataset.wid+'/'+e.target.dataset.payov,parseFloat(e.target.value)||0);},600);});});
    // Week note
    document.querySelectorAll('[data-note]').forEach(function(ta){var nt=null;ta.addEventListener('input',function(e){clearTimeout(nt);nt=setTimeout(function(){fbSet('weekNotes/'+e.target.dataset.note,e.target.value);},800);});});
    // Open bucket
    document.querySelectorAll('[data-openbkt]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var b=decodeURIComponent(el.dataset.openbkt);if(!S.bucketConfig[b]){openSetupModal(b);return;}var ok=week.id+'__'+b;openBuckets[ok]=!openBuckets[ok];renderAll();});});
    // Chevron
    document.querySelectorAll('[data-chevron]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var b=decodeURIComponent(btn.dataset.chevron);openBuckets[week.id+'__'+b]=!openBuckets[week.id+'__'+b];renderAll();});});
    // Edit setup
    document.querySelectorAll('[data-editsetup]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();openSetupModal(decodeURIComponent(btn.dataset.editsetup));});});
    // Skip wk
    document.querySelectorAll('[data-skipwk]').forEach(function(btn){
      btn.addEventListener('pointerdown',function(e){e.stopPropagation();});
      btn.addEventListener('click',function(e){e.stopPropagation();var b=decodeURIComponent(btn.dataset.skipwk),wid=btn.dataset.weekid;
        if(isSkipped(wid,b)){fbRemove('skippedBuckets/'+wid+'/'+encodeURIComponent(b).replace(/%/g,'_'));}
        else{showConfirm('skip',b,wid);}
      });
    });
    // Delete all
    document.querySelectorAll('[data-delall]').forEach(function(btn){
      btn.addEventListener('pointerdown',function(e){e.stopPropagation();});
      btn.addEventListener('click',function(e){e.stopPropagation();showConfirm('delete',decodeURIComponent(btn.dataset.delall),null);});
    });
    // Restore
    document.querySelectorAll('[data-restore]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var b=decodeURIComponent(btn.dataset.restore);fbRemove('skippedBuckets/'+btn.dataset.weekid+'/'+encKey(b));});});
    // Weekly budget
    document.querySelectorAll('[data-wbkt]').forEach(function(inp){
      inp.addEventListener('click',function(e){e.stopPropagation();});
      inp.addEventListener('input',function(e){var bkt=decodeURIComponent(e.target.dataset.wbkt),wid=e.target.dataset.wid;var val=e.target.value===''?null:parseFloat(e.target.value);clearTimeout(bT['wb_'+bkt]);bT['wb_'+bkt]=setTimeout(function(){if(val===null)fbRemove('weekBudgets/'+wid+'/'+encodeURIComponent(bkt).replace(/%/g,'_'));else fbSet('weekBudgets/'+wid+'/'+encodeURIComponent(bkt).replace(/%/g,'_'),val);},600);});
    });
    // Log purchase
    document.querySelectorAll('[data-logpurchase]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();openPurchaseModal(decodeURIComponent(btn.dataset.logpurchase),null);});});
    // Edit purchase
    document.querySelectorAll('[data-editp]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var p=S.purchases[btn.dataset.editp];if(p)openPurchaseModal(p.bucket,p);});});
    // Delete purchase
    document.querySelectorAll('[data-delp]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();fbRemove('purchases/'+btn.dataset.delp);});});
    // Savings alloc
    document.querySelectorAll('[data-savingsalloc]').forEach(function(inp){
      inp.addEventListener('input',function(e){var key=decodeURIComponent(e.target.dataset.savingsalloc);var parts=key.split('__');var gi=parseInt(parts[2]);var val=parseFloat(e.target.value)||0;clearTimeout(bT['sa_'+gi]);bT['sa_'+gi]=setTimeout(function(){fbSet('savingsAllocations/'+encodeURIComponent(key).replace(/%/g,'_'),val);if(S.savingsGoals[gi])fbSet('savingsGoals/'+gi+'/saved',(parseFloat(S.savingsGoals[gi].saved)||0)+val);},600);});
    });
    // Add goal
    var ngi=document.getElementById('new-goal-inp'),agb=document.getElementById('add-goal-btn');
    if(agb)agb.addEventListener('click',function(){if(!ngi||!ngi.value.trim())return;fbSet('savingsGoals',(S.savingsGoals||[]).concat([{name:ngi.value.trim(),saved:0,target:0}]));ngi.value='';});
    // Add bucket
    var nbi=document.getElementById('new-bkt-inp'),abb=document.getElementById('add-bkt-btn');
    if(abb)abb.addEventListener('click',function(){if(!nbi||!nbi.value.trim()||S.buckets.indexOf(nbi.value.trim())>=0)return;fbSet('buckets',S.buckets.concat([nbi.value.trim()]));nbi.value='';});
    if(nbi)nbi.addEventListener('keydown',function(e){if(e.key==='Enter'&&abb)abb.click();});
  }

  function renderMonth(){
    var d=D();
    var mon=TODAY.getMonth(),yr=TODAY.getFullYear();
    var mWks=WEEKS.filter(function(w){return w.weekStart.getMonth()===mon&&w.weekStart.getFullYear()===yr;});
    var mInc=mWks.reduce(function(t,w){return t+getWeekIncome(w).total;},0);
    var mSpt=mWks.reduce(function(t,w){return t+getWeekDeductions(w.id);},0);
    var mLeft=mInc-mSpt;
    var h='<div style="padding:0 20px">';
    h+='<div style="margin-bottom:20px"><div style="font-family:\'DM Serif Display\',serif;font-size:34px;letter-spacing:-.01em;margin-bottom:4px;color:'+d.text+'">'+MOF[mon]+' '+yr+'</div><div style="font-size:14px;color:'+d.muted+'">'+mWks.length+' week'+(mWks.length!==1?'s':'')+'</div></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">';
    [{lbl:'Income',val:mInc,c:'#22C55E'},{lbl:'Spent',val:mSpt,c:'#ef4444'},{lbl:mLeft>=0?'Left':'Over',val:Math.abs(mLeft),c:mLeft>=0?'#22C55E':'#ef4444'}].forEach(function(s){h+='<div style="background:'+d.surface+';border-radius:14px;padding:14px;border:1px solid '+d.border+';text-align:center"><div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:'+d.muted+';margin-bottom:6px">'+s.lbl+'</div><div style="font-family:\'DM Serif Display\',serif;font-size:20px;color:'+s.c+'">'+fmt$(s.val)+'</div></div>';});
    h+='</div>';
    h+='<div style="background:'+d.surface+';border-radius:14px;padding:16px;border:1px solid '+d.border+';margin-bottom:24px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:14px;font-weight:600;color:'+d.text+'">Budget used</span><span style="font-size:14px;font-weight:700;color:'+(mSpt>mInc?'#ef4444':'#22C55E')+'">'+(mInc>0?Math.round((mSpt/mInc)*100):0)+'%</span></div><div style="height:8px;background:'+d.barBg+';border-radius:4px;overflow:hidden"><div style="height:100%;border-radius:4px;background:'+(mSpt>mInc?'#ef4444':'#22C55E')+';width:'+(mInc>0?Math.min(100,(mSpt/mInc)*100):0)+'%"></div></div></div>';
    h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="flex:1;height:1px;background:'+d.border+'"></div><span style="font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:'+d.muted+'">Week by Week</span><div style="flex:1;height:1px;background:'+d.border+'"></div></div>';
    mWks.forEach(function(w){
      var i=getWeekIncome(w),ded=getWeekDeductions(w.id),e=i.total-ded;
      var note=S.weekNotes[w.id];
      h+='<div data-gotoweek="'+w.id+'" style="display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid '+d.border+';cursor:pointer">'
        +'<div style="flex:1"><div style="font-size:15px;font-weight:600;color:'+(w.id===CUR_WK?'#22C55E':d.text)+'">'+fmtD(w.weekStart)+' - '+fmtD(w.weekEnd)+(w.id===CUR_WK?' (now)':'')+'</div>'
        +(note?'<div style="font-size:12px;color:'+d.muted+';margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(note)+'</div>':'')+'</div>'
        +'<div style="text-align:right">'+(i.total>0?'<div style="font-size:13px;font-weight:600;color:#22C55E">+'+fmt$(i.total)+'</div>':'')
        +'<div style="font-size:13px;color:'+(e>=0?d.muted:'#ef4444')+'">'+(e>=0?fmt$(e)+' left':fmt$(Math.abs(e))+' over')+'</div></div>'
        +'<span style="color:'+d.muted+';font-size:18px">></span></div>';
    });
    h+='</div>';
    document.getElementById('tab-content').innerHTML=h;
    document.querySelectorAll('[data-gotoweek]').forEach(function(el){el.addEventListener('click',function(){activeWeek=el.dataset.gotoweek;currentTab='week';renderAll();});});
  }

  function sheetStyle(){var d=D();return'background:'+d.surface+';border-radius:20px 20px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border:1px solid '+d.border+';color:'+d.text;}
  function fieldStyle(){var d=D();return'background:'+d.bg+';border:1.5px solid '+d.border+';border-radius:10px;padding:12px 14px;font-size:15px;color:'+d.text+';width:100%';}
  function btnStyle(bg,color){return'width:100%;background:'+bg+';color:'+(color||'white')+';border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px';}
  function btnOutline(){var d=D();return'width:100%;background:none;border:1px solid '+d.border+';border-radius:12px;padding:13px;font-size:15px;color:'+d.muted+';cursor:pointer';}
  function lbl(text){var d=D();return'<div style="font-size:11px;font-weight:700;color:'+d.muted+';margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">'+text+'</div>';}

  function showConfirm(type,bucket,weekId){
    var d=D();var modal=document.getElementById('modal-confirm');var sheet=document.getElementById('sheet-confirm');
    sheet.style.cssText=sheetStyle();
    var h='';
    if(type==='skip'){
      h='<div style="font-size:18px;font-weight:700;margin-bottom:8px">Hide this week only?</div>'
        +'<div style="font-size:14px;color:'+d.muted+';margin-bottom:24px;line-height:1.6"><strong style="color:'+d.text+'">'+esc(bucket)+'</strong> will be hidden this week only. All other weeks unaffected.</div>'
        +'<button id="cyes" style="'+btnStyle(d.text,d.bg)+'">Yes, hide this week</button>'
        +'<button id="cno" style="'+btnOutline()+'">Cancel</button>';
    }else{
      h='<div style="font-size:18px;font-weight:700;margin-bottom:8px">Delete from all weeks?</div>'
        +'<div style="font-size:14px;color:'+d.muted+';margin-bottom:24px;line-height:1.6"><strong style="color:'+d.text+'">'+esc(bucket)+'</strong> will be permanently removed from every week. Cannot be undone.</div>'
        +'<button id="cyes" style="'+btnStyle('#ef4444')+'">Yes, delete forever</button>'
        +'<button id="cno" style="'+btnOutline()+'">Cancel</button>';
    }
    sheet.innerHTML=h; modal.classList.remove('hidden');
    function close(){modal.classList.add('hidden');}
    document.getElementById('cno').addEventListener('click',close);
    modal.addEventListener('click',function(e){if(e.target===modal)close();});
    document.getElementById('cyes').addEventListener('click',function(){
      close();
      if(type==='skip'){fbSet('skippedBuckets/'+weekId+'/'+encodeURIComponent(bucket).replace(/%/g,'_'),true);openBuckets[weekId+'__'+bucket]=false;}
      else{Object.values(S.purchases||{}).filter(function(p){return p.bucket===bucket;}).forEach(function(p){fbRemove('purchases/'+p.id);});fbSet('buckets',S.buckets.filter(function(b){return b!==bucket;}));fbRemove('bucketConfig/'+encodeURIComponent(bucket).replace(/%/g,'_'));}
    });
  }

  function openPurchaseModal(bucket,editP){
    var d=D();var modal=document.getElementById('modal-purchase');var sheet=document.getElementById('sheet-purchase');
    var name=editP?editP.name:'',amt=editP?editP.amt:'',date=editP?editP.date:todayStr,note=editP?editP.note||'':'',weekId=editP?editP.weekId:activeWeek,bkt=editP?editP.bucket:bucket;
    var editId=editP?editP.id:null;
    sheet.style.cssText=sheetStyle();
    var wkOpts='';WEEKS.forEach(function(w){var i=getWeekIncome(w);wkOpts+='<option value="'+w.id+'"'+(w.id===weekId?' selected':'')+'>'+fmtD(w.weekStart)+'-'+fmtD(w.weekEnd)+(w.id===CUR_WK?' (this week)':'')+(i.total>0?' - '+fmt$(i.total)+' in':'')+'</option>';});
    var bktOpts='';S.buckets.forEach(function(b){bktOpts+='<option value="'+esc(b)+'"'+(b===bkt?' selected':'')+'>'+esc(b)+'</option>';});
    var fs=fieldStyle();
    sheet.innerHTML='<div style="font-size:20px;font-weight:700;margin-bottom:20px">'+(editId?'Edit Purchase':'Log Purchase')+'</div>'
      +'<input id="p-name" placeholder="What did you buy?" value="'+esc(name)+'" style="'+fs+';margin-bottom:12px"/>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'
      +'<div>'+lbl('Amount')+'<div style="display:flex;align-items:center;gap:4px;background:'+d.bg+';border:1.5px solid '+d.border+';border-radius:10px;padding:11px 14px"><span style="color:'+d.muted+';font-size:16px">$</span><input id="p-amt" type="number" inputmode="decimal" placeholder="0.00" value="'+esc(String(amt))+'" style="background:none;border:none;font-size:16px;font-weight:700;color:'+d.text+';width:100%"/></div></div>'
      +'<div>'+lbl('Date')+'<input id="p-date" type="date" value="'+date+'" style="'+fs+';color-scheme:'+(dark?'dark':'light')+'"/></div></div>'
      +'<div style="margin-bottom:12px">'+lbl('Bucket')+'<select id="p-bkt" style="'+fs+'">'+bktOpts+'</select></div>'
      +'<div style="margin-bottom:12px">'+lbl('Assign to Week')+'<select id="p-wk" style="'+fs+'">'+wkOpts+'</select></div>'
      +'<input id="p-note" placeholder="Note (optional)" value="'+esc(note)+'" style="'+fs+';margin-bottom:16px"/>'
      +'<button id="p-save" style="'+btnStyle('#22C55E')+'">'+(editId?'Save Changes':'Save Purchase')+'</button>'
      +'<button id="p-cancel" style="'+btnOutline()+'">Cancel</button>';
    modal.classList.remove('hidden');
    setTimeout(function(){var n=document.getElementById('p-name');if(n)n.focus();},150);
    function close(){modal.classList.add('hidden');}
    document.getElementById('p-cancel').addEventListener('click',close);
    modal.addEventListener('click',function(e){if(e.target===modal)close();});
    document.getElementById('p-save').addEventListener('click',function(){
      var pname=document.getElementById('p-name').value.trim();
      var pamt=parseFloat(document.getElementById('p-amt').value);
      var pdate=document.getElementById('p-date').value;
      var pnote=document.getElementById('p-note').value.trim();
      var pwid=document.getElementById('p-wk').value;
      var pbkt=document.getElementById('p-bkt').value;
      if(!pname||!pamt)return;
      var id=editId||(('p'+Date.now()+''+Math.floor(Math.random()*9999)));
      fbSet('purchases/'+id,{id:id,name:pname,amt:pamt,date:pdate,note:pnote,weekId:pwid,bucket:pbkt});
      close();
    });
  }

  function openSetupModal(bucket){
    var d=D();var modal=document.getElementById('modal-setup');var sheet=document.getElementById('sheet-setup');
    var ex=S.bucketConfig[bucket]||{};
    var cadence=ex.cadence||'weekly',amount=ex.amount||'',week1Id=ex.week1Id||activeWeek;
    function render(){
      var fs=fieldStyle();
      var wkOpts='';WEEKS.slice(0,12).forEach(function(w){var i=getWeekIncome(w);wkOpts+='<div data-pickw="'+w.id+'" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;border:1.5px solid '+(week1Id===w.id?'#22C55E':d.border)+';background:'+(week1Id===w.id?(dark?'rgba(34,197,94,.08)':'rgba(34,197,94,.06)'):'transparent')+';margin-bottom:8px;cursor:pointer"><div><div style="font-size:14px;font-weight:600;color:'+(week1Id===w.id?'#22C55E':d.text)+'">'+fmtD(w.weekStart)+' - '+fmtD(w.weekEnd)+(w.id===CUR_WK?' (this week)':'')+'</div>'+(i.total>0?'<div style="font-size:12px;color:#f97316;margin-top:2px">'+fmt$(i.total)+' paycheck this week</div>':'')+'</div><div style="width:20px;height:20px;border-radius:50%;border:2px solid '+(week1Id===w.id?'#22C55E':d.border)+';background:'+(week1Id===w.id?'#22C55E':'none')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(week1Id===w.id?'<div style="width:8px;height:8px;border-radius:50%;background:white"></div>':'')+'</div></div>';});
      sheet.style.cssText=sheetStyle();
      sheet.innerHTML='<div style="font-size:20px;font-weight:700;margin-bottom:4px">Set Up - '+esc(bucket)+'</div>'
        +'<div style="font-size:14px;color:'+d.muted+';margin-bottom:20px">Choose how this bucket works</div>'
        +lbl('How often does this reset?')
        +'<div style="display:flex;gap:10px;margin-bottom:20px">'
        +[['weekly','Weekly','Resets every week'],['biweekly','Biweekly','Every 2 weeks with rollover']].map(function(arr){return'<button data-cadence="'+arr[0]+'" style="flex:1;padding:14px;border-radius:12px;border:2px solid '+(cadence===arr[0]?'#22C55E':d.border)+';background:'+(cadence===arr[0]?(dark?'rgba(34,197,94,.08)':'rgba(34,197,94,.06)'):'transparent')+';color:'+d.text+';cursor:pointer;text-align:left"><div style="font-size:15px;font-weight:700;margin-bottom:4px">'+arr[1]+'</div><div style="font-size:12px;color:'+d.muted+'">'+arr[2]+'</div></button>';}).join('')
        +'</div>'
        +lbl((cadence==='biweekly'?'Biweekly':'Default weekly')+' budget')
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;background:'+d.bg+';border:1.5px solid '+d.border+';border-radius:10px;padding:12px 16px"><span style="font-size:22px;color:'+d.muted+';font-weight:300">$</span><input id="setup-amt" type="number" inputmode="decimal" placeholder="'+(cadence==='biweekly'?'1000':'500')+'" value="'+esc(String(amount))+'" style="background:none;border:none;font-size:26px;font-weight:700;color:'+d.text+';width:100%"/></div>'
        +(cadence==='biweekly'?lbl('Which week is Week 1?')+'<div style="font-size:13px;color:'+d.muted+';margin-bottom:12px">Full budget hits income on Week 1. Week 2 carries leftover free.</div><div style="max-height:200px;overflow-y:auto;margin-bottom:16px">'+wkOpts+'</div>':'')
        +'<button id="setup-save" style="'+btnStyle('#22C55E')+'">Save Setup</button>'
        +'<button id="setup-cancel" style="'+btnOutline()+'">Cancel</button>';
      document.querySelectorAll('[data-cadence]').forEach(function(btn){btn.addEventListener('click',function(){cadence=btn.dataset.cadence;render();});});
      document.querySelectorAll('[data-pickw]').forEach(function(row){row.addEventListener('click',function(){week1Id=row.dataset.pickw;render();});});
      var sa=document.getElementById('setup-amt');if(sa)sa.addEventListener('input',function(){amount=parseFloat(sa.value)||0;});
      function close(){modal.classList.add('hidden');}
      document.getElementById('setup-cancel').addEventListener('click',close);
      modal.addEventListener('click',function(e){if(e.target===modal)close();});
      document.getElementById('setup-save').addEventListener('click',function(){
        var a=parseFloat(document.getElementById('setup-amt').value)||0;
        fbSet('bucketConfig/'+encodeURIComponent(bucket).replace(/%/g,'_'),{cadence:cadence,amount:a,week1Id:cadence==='biweekly'?week1Id:null});
        openBuckets[activeWeek+'__'+bucket]=true;close();
      });
    }
    render();modal.classList.remove('hidden');
  }

  function openExportModal(){
    var d=D();var modal=document.getElementById('modal-export');var sheet=document.getElementById('sheet-export');
    var count=Object.values(S.purchases||{}).length;
    sheet.style.cssText='background:'+d.surface+';border-radius:16px;padding:24px;width:100%;max-width:400px;border:1px solid '+d.border+';color:'+d.text;
    sheet.innerHTML='<div style="font-size:20px;font-weight:700;margin-bottom:8px">Export Data</div>'
      +'<div style="font-size:14px;color:'+d.muted+';margin-bottom:16px;line-height:1.6">Download all purchases as a CSV. Opens in Excel, Numbers, or Google Sheets.</div>'
      +'<div style="font-size:14px;font-weight:600;margin-bottom:20px;color:'+d.text+'">'+count+' purchases total</div>'
      +'<button id="exp-go" style="'+btnStyle('#22C55E')+'">Download CSV</button>'
      +'<button id="exp-cancel" style="'+btnOutline()+'">Cancel</button>';
    modal.classList.remove('hidden');
    function close(){modal.classList.add('hidden');}
    document.getElementById('exp-cancel').addEventListener('click',close);
    modal.addEventListener('click',function(e){if(e.target===modal)close();});
    document.getElementById('exp-go').addEventListener('click',function(){
      var rows=[['Date','Name','Note','Amount','Bucket','Week']];
      Object.values(S.purchases||{}).sort(function(a,b){return a.date>b.date?1:-1;}).forEach(function(p){var wk=WEEKS.find(function(w){return w.id===p.weekId;});rows.push([p.date,p.name,p.note||'',p.amt,p.bucket,wk?fmtD(wk.weekStart):'']);});
      var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
      var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download='budgetpro.csv';a.click();URL.revokeObjectURL(url);close();
    });
  }

  if('serviceWorker'in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});
}
})();
</script>
</body>
</html>
